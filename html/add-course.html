<!doctype>
<html>
 <head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Course</title>
  <link rel="stylesheet" href="../css/project-style.css">
 </head>
 <body>
  <header>
   <h1>Personal Course Organizer</h1>
   <nav>
    <ul>
       <li><a href="/personal-course-organizer/" target="_self" title="Go to home page">Home</a></li>
       <li><a href="my-courses.html" target="_self" title="Go to my courses page">My Courses</a></li>
       <li><a href="add-course.html" target="_self" title="Go to add course page" class="active">Add Course</a></li>
       <li><a href="contact-us.html" target="_self" title="Go to contact us page">Contact Us</a></li>
      </ul>
   </nav>
  </header>
  <main>
   <section>
    <h2>Add Course</h2>   
    <form method="Post">
     <div>
      <label for="course-name">Course Name</label>   
      <input type="text" placeholder="Enter course name" id="course-name" required autofocus>
     </div>
     <br> 
     <div>
      <label for="course-lecturer">Course Lecturer</label>
      <input type="text" placeholder="Enter course lecturer" id="course-lecturer" required>
     </div>
     <br>
     <div>  
      <label for="credit-hours">Credit Hours</label>
      <input type="number" min="0" max="4" placeholder="Enter credit hours" id="credit-hours" required> 
     </div>
     <br>
     <div>
      <label for="notes">Notes</label>
      <br>
      <textarea name="notes" rows="5" cols="40" placeholder="Enter notes" id="notes"></textarea>
     </div>
     <br>
     <div class="button">
      <input type="submit" value="Add">
      <input type="reset" value="Reset">
     </div>    
    </form>
   </section>
  </main>
  <footer>
   <p><i>Thank you!</i></p>
   <p>Designed by &copy; 2026 Retag Barakat.</p>
  </footer> 
 </body>
 </html>
