<html>
 <head>

 </head>
 <body>
  <header>
   <h1>Personal Course Organizer</h1>
   <nav>
    <ul>
       <li><a href="../index.html" target="_self" title="Go to home page">Home</a></li>
       <li><a href="my-courses.html" target="_self" title="Go to my courses page">My Courses</a></li>
       <li><a href="add-course.html" target="_self" title="Go to add course page">Add Course</a></li>
       <li><a href="contact-us.html" target="_self" title="Go to contact us page" class="active">Contact Us</a></li>
      </ul>
   </nav>
  </header>
  <main>
   <section> 
    <h3><i>We are here to help you, you can send your message to us by filling out the form below:</i></h3>
    <form>
     <div>
      <label for="first-name">First Name</label>
      <input type="text" placeholder="Enter your first name" id="first-name" required autofocus>
     </div>
     <br>
     <div>
      <label for="last-name">Last Name</label>
      <input type="text" placeholder="Enter your last name" id="last-name" required>
     </div>
     <br>
     <div>
      <label for="email">E-mail</label>
      <input type="email" placeholder="r@nn.com" id="email" required>
     </div>
     <br>
     <div>
      <label for="message">Message </label>
      <br> 
      <textarea name="message" rows="5" cols="40" placeholder="Enter your message" id="message" required></textarea>
     </div>
     <br>
     <div class="button">
      <input type="submit" value="Send">
      <input type="reset" value="Reset"> 
     </div>
    </form>
   </section>
  </main> 
  <footer>
   <p><i>Thank you!</i></p>
   <p>Designed by &copy; 2026 Retag Barakat.</p>
  </footer> 
 </body>
</html>
